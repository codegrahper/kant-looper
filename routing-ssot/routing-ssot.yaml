schema_version: 1.1.0
document:
  id: kant-looper-routing-ssot
  title: Kant Looper Multimodel Routing SSOT
  status: active
  effective_date: '2026-07-16'
  last_verified_at: '2026-07-16'
  owner: Kant Looper maintainers
  approval_required: true
  source_of_truth: true
  generated_docs:
  - references/multimodel-coding-agent-routing-guide.md
  - references/multimodel-coding-agent-routing-guide-simplified.md
governance:
  principles:
  - provider_independence
  - human_final_control
  - least_privilege
  - evidence_before_success
  - cross_provider_review
  - reproducible_routing
  normative_language: RFC2119
  change_control:
    direct_edit_to_generated_docs: forbidden
    ssot_change_requires:
    - schema_validation
    - semantic_validation
    - source_verification
    - regression_evaluation
    - human_approval
    emergency_disable_without_benchmark: true
    emergency_enable_without_benchmark: false
# agent_bindings encodes the 5 compatibility rules enforced at runtime by
# kant-loop.sh::validate_agent_model_compatibility() (lines 327-368).
# - allowed_model_patterns: model_id must match at least one (grep -E semantics)
# - denied_model_patterns: model_id must NOT match any
# Each model's agent_tool MUST be drawn from these keys.
agent_bindings:
  codex:
    display_name: Codex CLI
    allowed_model_patterns:
    - '^gpt-'
  opencode:
    display_name: OpenCode
    allowed_model_patterns:
    - '^glm-'
    - '^MiniMax-'
  grok:
    display_name: Grok CLI
    allowed_model_patterns:
    - '^grok-'
  agy:
    display_name: Antigravity (agy)
    allowed_model_patterns:
    - '^gemini-'
  claude:
    display_name: Claude CLI
    # claude rejects only MiniMax-*; everything else is accepted.
    # claude-default (the CLI's own default) is the universal safety net.
    denied_model_patterns:
    - '^MiniMax-'
