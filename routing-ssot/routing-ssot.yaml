task_tiers:
  T0:
    description: Read, summarize, classify, or deterministic transformation
    risk: low
  T1:
    description: One or two files with explicit acceptance criteria
    risk: low
  T2:
    description: Multiple files with ordinary design choices
    risk: medium
  T3:
    description: Repository-wide, ambiguous, or architecture-affecting work
    risk: high
  T4:
    description: Long-running, multi-system, production, security, financial, or destructive-risk work
    risk: critical
# Route primary/fallbacks use the format: `<agent_tool>|<provider>/<model_id>`
# This mirrors the runtime fallback-dispatcher.sh chain strings (`agent|model`)
# with the provider namespace prepended for SSOT self-containment.
# Every chain MUST terminate with `claude|anthropic/claude-default` (the universal
# safety net) to match the runtime invariant that all 8 chains end with claude|default.
routes:
  tiny:
    # Code route name: tiny (routing-parser.sh::judge_task_routing).
    # Maps to fallback-dispatcher.sh primary codex|gpt-5.6-luna chain.
    eligible_tiers:
    - T0
    - T1
    required_capabilities: []
    primary: codex|openai/gpt-5.6-luna
    fallbacks:
    - claude|anthropic/claude-default
    max_attempts_per_model: 2
  standard_repo:
    # Code route name: standard.
    # Maps to fallback-dispatcher.sh primary codex|gpt-5.6-terra chain.
    eligible_tiers:
    - T1
    - T2
    required_capabilities:
    - coding
    - tool_use
    primary: codex|openai/gpt-5.6-terra
    fallbacks:
    - codex|openai/gpt-5.6-luna
    - opencode|zai/glm-5.2
    - agy|google/gemini-3.5-flash
    - claude|anthropic/claude-default
    max_attempts_per_model: 2
  hard_repo:
    # Code route name: hard.
    # Maps to fallback-dispatcher.sh primary codex|gpt-5.6-sol chain.
    eligible_tiers:
    - T3
    - T4
    required_capabilities:
    - coding
    - tool_use
    primary: codex|openai/gpt-5.6-sol
    fallbacks:
    - codex|openai/gpt-5.6-terra
    - opencode|zai/glm-5.2
    - agy|google/gemini-3.5-flash
    - grok|xai/grok-4.5
    - claude|anthropic/claude-default
    max_attempts_per_model: 1
  huge_context:
    # Code route name: huge.
    # Maps to fallback-dispatcher.sh primary opencode|glm-5.2 chain.
    eligible_tiers:
    - T2
    - T3
    - T4
    required_capabilities:
    - huge_context
    primary: opencode|zai/glm-5.2
    fallbacks:
    - opencode|zai/glm-4.7
    - codex|openai/gpt-5.6-terra
    - agy|google/gemini-3.5-flash
    - grok|xai/grok-4.5
    - claude|anthropic/claude-default
    max_attempts_per_model: 1
  visual_browser:
    # Code route name: visual.
    # Maps to fallback-dispatcher.sh primary agy|gemini-3.5-flash chain.
    # NOTE: references/fallback-table.md lists glm-5v-turbo and MiniMax-M3 in this
    # chain, but the runtime code does not - that doc/code mismatch is tracked
    # separately and is out of scope for SSOT Phase 1.
    eligible_tiers:
    - T1
    - T2
    - T3
    required_capabilities:
    - multimodal
    primary: agy|google/gemini-3.5-flash
    harness: antigravity
    fallbacks:
    - agy|google/gemini-3.1-pro-preview
    - opencode|zai/glm-5.2
    - claude|anthropic/claude-default
    max_attempts_per_model: 1
  review:
    # Code route name: review (independent route per routing-parser.sh::judge_task_routing
    # case 'review'). Uses the same primary (codex|gpt-5.6-sol) and therefore the
    # same fallback chain as hard_repo.
    eligible_tiers:
    - T3
    - T4
    required_capabilities:
    - coding
    - tool_use
    primary: codex|openai/gpt-5.6-sol
    fallbacks:
    - codex|openai/gpt-5.6-terra
    - opencode|zai/glm-5.2
    - agy|google/gemini-3.5-flash
    - grok|xai/grok-4.5
    - claude|anthropic/claude-default
    max_attempts_per_model: 1
  long_tool_chain:
    # PROPOSED: no equivalent route exists in routing-parser.sh::judge_task_routing
    # and no fallback chain in fallback-dispatcher.sh uses glm-5-turbo.
    # Retained as a design proposal; status will flip to active once code is wired.
    status: proposed
    eligible_tiers:
    - T2
    - T3
    required_capabilities:
    - long_tool_chain
    primary: opencode|zai/glm-5-turbo
    fallbacks:
    - codex|openai/gpt-5.6-sol
    - opencode|minimax/MiniMax-M3
    - claude|anthropic/claude-default
    max_attempts_per_model: 1
selection_policy:
  hard_exclusions:
  - model_status_deprecated
  - model_unavailable
  - missing_required_capability
  - provider_disabled
  - cost_budget_exceeded
  - region_or_data_policy_violation
  scoring:
    internal_regression_score: 35
    task_fit: 20
    reliability: 15
    security_compliance: 10
    latency: 8
    cost: 7
    provider_diversity: 5
  tie_breakers:
  - stable_over_preview
  - lower_failure_rate
  - lower_cost
  - lower_latency
review_policy:
  required_for:
  - T3
  - T4
  - security_sensitive
  - production_change
  - destructive_change
  provider_must_differ_from_implementer: true
  reviewer_must_not_share_model_family: true
  minimum_reviewers:
    T3: 1
    T4: 2
  human_approval_required_for:
  - T4
  - production_change
  - destructive_change
  - secrets_access
  - iam_change
execution_policy:
  default_mode: read_only
  network_default: deny
  write_mode: patch_only
  destructive_commands: deny
  secret_paths:
  - .env
  - '**/*secret*'
  - '**/*credential*'
  - ~/.ssh/**
  audit_fields:
  - task_id
  - ssot_version
  - ssot_sha256
  - provider
  - model
  - harness
  - tool_calls
  - changed_files
  - tests
  - exit_codes
  - policy_events
  success_requires:
  - nonempty_diff_or_explicit_no_change
  - allowed_paths_only
  - acceptance_tests_recorded
  - exit_codes_recorded
  - secret_scan_pass
  - policy_validation_pass
no_progress_policy:
  same_failure_limit: 2
  meaningless_same_file_edits_limit: 3
  tool_calls_without_progress_limit: 10
  budget_escalation_threshold_percent: 80
evaluation_policy:
  external_benchmarks_are_advisory: true
  external_benchmark_requires:
  - name
  - score
  - metric
  - harness
  - evaluated_at
  - source_url
  routing_decisions_use_internal_regression_first: true
  internal_regression_frequency: monthly
  minimum_samples_per_route: 20
  promotion_requires:
    success_rate_not_worse_than_current_percent: 2
    no_security_regression: true
    cost_or_latency_improvement_required_when_quality_equal: true
update_policy:
  checks:
    provider_model_status: weekly
    pricing_and_quota: weekly_and_before_release
    provider_release_notes: weekly
    external_benchmarks: on_release
    internal_regression: monthly
    security_and_mcp_policy: quarterly
  automation_output: candidate_patch_only
  auto_merge: false
  required_pipeline:
  - collect_official_sources
  - normalize_candidate_json
  - verify_urls_and_dates
  - validate_schema
  - validate_semantics
  - run_internal_regression
  - generate_markdown_docs
  - show_diff
  - cross_provider_review
  - human_approval
  - merge
